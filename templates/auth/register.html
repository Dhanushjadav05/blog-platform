{% extends "base.html" %}

{% block title %}Create Account - VibeWrite{% endblock %}

{% block content %}
<section class="py-6 bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <h2 class="fw-bold">Join VibeWrite</h2>
                            <p class="text-muted">Create your account and start writing today</p>
                        </div>
                        
                        <form method="POST" action="{{ url_for('register') }}">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control form-control-lg" 
                                           placeholder="Choose a username" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" name="email" class="form-control form-control-lg" 
                                           placeholder="Enter your email" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" 
                                       placeholder="Create a password" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Account Type</label>
                                <select name="role" class="form-select form-select-lg" required>
                                    <option value="reader">Reader</option>
                                    <option value="author">Writer</option>
                                    <option value="advertiser">Advertiser</option>
                                </select>
                                <small class="text-muted">Choose how you'd like to use VibeWrite</small>
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">
                                Create Account
                            </button>
                            
                            <div class="text-center">
                                <p class="text-muted">
                                    Already have an account? 
                                    <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold">Sign in</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
