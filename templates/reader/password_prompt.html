{% extends "base.html" %}

{% block title %}Protected Post - VibeWrite{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="fas fa-lock fa-3x text-warning mb-3"></i>
                <h3>Protected Post</h3>
                <p class="text-muted mb-4">
                    This post is password protected. Please enter the password to view the content.
                </p>
                
                <form method="GET" action="{{ url_for('view_post', post_id=post.id) }}" 
                      class="mb-3">
                    <div class="form-group mb-3">
                        <input type="password" name="password" class="form-control form-control-lg" 
                               placeholder="Enter post password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-unlock me-2"></i>Access Post
                    </button>
                </form>
                
                <small class="text-muted">
                    Don't have the password? Contact the author for access.
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
